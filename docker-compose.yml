services:
  # PostgreSQL Database
  postgres:
    build:
      context: ./firefeed-api
      dockerfile: postgres-pgvector.Dockerfile
    container_name: firefeed-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - firefeed-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: firefeed-redis
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - firefeed-network

  # FireFeed API Service (Foundation - must start first)
  firefeed-api:
    build:
      context: .
      dockerfile: ./firefeed-api/Dockerfile
    container_name: firefeed-api
    restart: unless-stopped
    env_file:
      - .env
      - ./firefeed-api/.env
    environment:
      # Service Configuration
      SERVICE_NAME: firefeed-api
      SERVICE_VERSION: 1.0.0
      API_BASE_URL: http://localhost:8001

      # Internal Rate Limiting
      INTERNAL_RATE_LIMIT_MAX: 10000
      INTERNAL_RATE_WINDOW_SECONDS: 60
      RSS_RATE_MULTIPLIER: 10

      # Logging Configuration
      LOG_LEVEL: INFO

      # CORS Configuration
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0

      # Rate Limiting
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW: 60

    ports:
      - "8001:8000"

    volumes:
      - ./firefeed-api/logs:/app/logs
      - ./firefeed-api/data:/app/data

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - firefeed-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # FireFeed RSS Parser Service
  firefeed-rss-parser:
    build:
      context: .
      dockerfile: ./firefeed-rss-parser/Dockerfile
      target: production
    container_name: firefeed-rss-parser
    restart: unless-stopped
    env_file:
      - .env
      - ./firefeed-rss-parser/.env
    environment:
      # API Configuration
      FIREFEED_API_BASE_URL: http://firefeed-api:8000
      FIREFEED_API_TOKEN: ${RSS_PARSER_SERVICE_API_TOKEN}
      SERVICE_API_TOKEN: ${RSS_PARSER_SERVICE_API_TOKEN}
      FIREFEED_SERVICE_ID: ${RSS_PARSER_SERVICE_ID}
      SERVICE_ID: ${RSS_PARSER_SERVICE_ID}

    ports:
      - "8081:8081"  # Health check port

    volumes:
      - ./firefeed-rss-parser/logs:/app/logs
      - ./firefeed-rss-parser/data:/app/data

    depends_on:
      firefeed-api:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - firefeed-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # FireFeed Telegram Bot Service
  firefeed-telegram-bot:
    build:
      context: .
      dockerfile: ./firefeed-telegram-bot/Dockerfile
    container_name: firefeed-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
      - ./firefeed-telegram-bot/.env
    environment:
      # API Configuration
      FIREFEED_API_BASE_URL: http://firefeed-api:8000
      FIREFEED_API_TOKEN: ${TELEGRAM_BOT_SERVICE_API_TOKEN}
      SERVICE_API_TOKEN: ${TELEGRAM_BOT_SERVICE_API_TOKEN}
      FIREFEED_SERVICE_ID: ${TELEGRAM_BOT_SERVICE_ID}
      SERVICE_ID: ${TELEGRAM_BOT_SERVICE_ID}

    ports:
      - "8082:8081"  # Health check port

    volumes:
      - ./firefeed-telegram-bot/logs:/app/logs
      - ./firefeed-telegram-bot/data:/app/data

    depends_on:
      firefeed-api:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - firefeed-network

    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  firefeed-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
